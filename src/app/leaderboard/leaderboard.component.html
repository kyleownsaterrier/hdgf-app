<!-- Header -->
<div class="app-header">
  <div class="header-top">
    <div class="brand-row">
      <div class="brand-icon">🏆</div>
      <span class="brand-name">Leaderboard</span>
    </div>
    <button class="refresh-btn" (click)="refresh()" aria-label="Refresh">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.51"/>
      </svg>
    </button>
  </div>
</div>

<!-- Column Headers -->
<div class="lb-col-headers">
  <div class="lb-hd rank-hd">#</div>
  <div class="lb-hd player-hd">Player</div>
  <div class="lb-hd tag-hd">Tag</div>
  <div class="lb-hd date-hd">Last Played</div>
</div>

<!-- Loading -->
<div class="lb-area">
  <div *ngIf="loading" class="lb-loading">
    <span class="loading-dot"></span>
    Loading…
  </div>

  <div *ngIf="!loading && entries.length === 0" class="lb-empty">
    No entries yet. Press <strong>Update Leaderboard</strong> after assigning tags.
  </div>

  <!-- Rows -->
  <div *ngIf="!loading && entries.length > 0" class="lb-rows">
    <div
      *ngFor="let entry of entries; let i = index"
      class="lb-row"
      [class.top-three]="i < 3"
    >
      <div class="lb-rank" [class.gold]="i === 0" [class.silver]="i === 1" [class.bronze]="i === 2">
        {{ i + 1 }}
      </div>
      <div class="lb-player">{{ entry.playerName }}</div>
      <div class="lb-tag">{{ entry.tagNum }}</div>
      <div class="lb-date">{{ formatDate(entry.lastPlayed) }}</div>
    </div>
  </div>
</div>
