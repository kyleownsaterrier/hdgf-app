<!-- Header -->
<div class="app-header">
  <div class="header-top">
    <div class="brand-row">
      <div class="brand-icon">🏆</div>
      <span class="brand-name">Leaderboard</span>
    </div>
    <div class="header-actions">
      <button class="add-btn" (click)="startAdd()" aria-label="Add player">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
      <button class="refresh-btn" (click)="refresh()" aria-label="Refresh">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.51"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<!-- Column Headers -->
<div class="lb-col-headers">
  <div class="lb-hd rank-hd">#</div>
  <div class="lb-hd player-hd">Player</div>
  <div class="lb-hd tag-hd">Tag</div>
  <div class="lb-hd date-hd">Last Played</div>
  <div class="lb-hd action-hd"></div>
</div>

<!-- List area -->
<div class="lb-area">

  <!-- Loading -->
  <div *ngIf="loading" class="lb-loading">
    <span class="loading-dot"></span> Loading…
  </div>

  <!-- Empty -->
  <div *ngIf="!loading && entries.length === 0 && !addingNew" class="lb-empty">
    No entries yet.<br>Tap <strong>+</strong> to add a player.
  </div>

  <!-- Rows -->
  <div *ngIf="!loading" class="lb-rows">

    <!-- Add new row (appears at top) -->
    <div *ngIf="addingNew" class="lb-row lb-add-row">
      <div class="lb-rank new-rank">—</div>
      <div class="lb-edit-cell">
        <input class="lb-edit-input" type="text" [(ngModel)]="newEntry.playerName"
          placeholder="Player name" autofocus />
      </div>
      <div class="lb-edit-cell tag-cell">
        <input class="lb-edit-input tag-input" type="number" [(ngModel)]="newEntry.tagNum"
          placeholder="0" min="1" />
      </div>
      <div class="lb-edit-cell date-cell">
        <input class="lb-edit-input date-input" type="date" [(ngModel)]="newEntry.lastPlayed" />
      </div>
      <div class="lb-actions">
        <button class="lb-save-btn" (click)="saveNew()" [disabled]="addSaving || !newEntry.playerName || !newEntry.tagNum">
          <span *ngIf="!addSaving">✓</span>
          <span *ngIf="addSaving" class="saving-dot"></span>
        </button>
        <button class="lb-cancel-btn" (click)="cancelAdd()">✕</button>
      </div>
    </div>

    <!-- Existing entries -->
    <div
      *ngFor="let entry of entries; let i = index; trackBy: trackById"
      class="lb-row"
      [class.top-three]="i < 3"
      [class.is-editing]="entry.editing"
    >
      <!-- View mode -->
      <ng-container *ngIf="!entry.editing">
        <div class="lb-rank" [class.gold]="i===0" [class.silver]="i===1" [class.bronze]="i===2">{{ i + 1 }}</div>
        <div class="lb-player">{{ entry.playerName }}</div>
        <div class="lb-tag">{{ entry.tagNum }}</div>
        <div class="lb-date">{{ formatDate(entry.lastPlayed) }}</div>
        <div class="lb-actions">
          <button class="lb-edit-btn" (click)="startEdit(entry)" aria-label="Edit">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
          </button>
          <button class="lb-delete-btn" (click)="deleteEntry(entry)" [disabled]="entry.deleting" aria-label="Delete">
            <span *ngIf="!entry.deleting">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                <path d="M10 11v6"/><path d="M14 11v6"/>
              </svg>
            </span>
            <span *ngIf="entry.deleting" class="saving-dot"></span>
          </button>
        </div>
      </ng-container>

      <!-- Edit mode -->
      <ng-container *ngIf="entry.editing">
        <div class="lb-rank edit-rank">—</div>
        <div class="lb-edit-cell">
          <input class="lb-edit-input" type="text" [(ngModel)]="entry.editName" placeholder="Player name" />
        </div>
        <div class="lb-edit-cell tag-cell">
          <input class="lb-edit-input tag-input" type="number" [(ngModel)]="entry.editTag" placeholder="0" min="1" />
        </div>
        <div class="lb-edit-cell date-cell">
          <input class="lb-edit-input date-input" type="date" [(ngModel)]="entry.editDate" />
        </div>
        <div class="lb-actions">
          <button class="lb-save-btn" (click)="saveEdit(entry)" [disabled]="entry.saving">
            <span *ngIf="!entry.saving">✓</span>
            <span *ngIf="entry.saving" class="saving-dot"></span>
          </button>
          <button class="lb-cancel-btn" (click)="cancelEdit(entry)">✕</button>
        </div>
      </ng-container>
    </div>
  </div>

</div>
