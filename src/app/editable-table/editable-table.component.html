<!-- App Header -->
<div class="app-header">
  <div class="header-top">
    <div class="brand-row">
      <div class="brand-icon">⊞</div>
      <span class="brand-name">Doubles</span>
    </div>
    <div class="header-right">
      <span class="save-indicator"
        [class.saving]="saveStatus === 'saving'"
        [class.saved]="saveStatus === 'saved'"
        [class.error]="saveStatus === 'error'">
        <span *ngIf="saveStatus === 'saving'" class="saving-dot"></span>
        <span *ngIf="saveStatus === 'saved'">✓</span>
        <span *ngIf="saveStatus === 'error'">⚠</span>
        <span *ngIf="saveStatus !== 'idle'">
          {{ saveStatus === 'saving' ? 'Saving…' : saveStatus === 'saved' ? 'Saved' : 'Error' }}
        </span>
      </span>
      <div class="row-pill">
        <span class="row-pill-num">{{ filledRowCount }}</span><span> / {{ rows.length }}</span>
      </div>
    </div>
  </div>
</div>

<!-- Action Chips -->
<div class="action-bar">
  <button class="chip chip-shuffle" [class.flash]="shuffleFlash" (click)="shuffleColumnB()">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
      <polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/>
      <polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/>
    </svg>
    Shuffle B
  </button>
  <button class="chip" (click)="clearAll()">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
      <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.51"/>
    </svg>
    Clear
  </button>
</div>

<!-- Cali Player Banner -->
<div class="cali-banner" [class.hidden]="!caliPlayerVisible" [class.flash-border]="caliBannerFlash">
  <div class="cali-label">
    <span class="cali-label-dot"></span>
    Cali Player
  </div>
  <div class="cali-body">
    <div class="cali-value" [class.empty]="!caliPlayerValue.trim()">
      {{ caliPlayerValue.trim() || '—' }}
    </div>
    <button class="cali-dismiss" (click)="removeCaliPlayer()" aria-label="Remove Cali Player">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>
</div>

<!-- Column Headers -->
<div class="col-headers">
  <div></div>
  <div class="col-hd">Column A</div>
  <div class="col-hd">
    <div class="col-hd-inner">
      Column B
      <span class="shuf-badge" [class.lit]="shuffleFlash">
        {{ shuffleCount > 0 ? '×' + shuffleCount : '' }}
      </span>
    </div>
  </div>
</div>

<!-- Table Scroll Area -->
<div class="table-area">
  <div class="rows-wrap">
    <div
      *ngFor="let row of rows; let i = index; trackBy: trackById"
      class="data-row"
      [class.has-data]="row.leftValue || row.rightValue"
    >
      <div class="row-idx">{{ i + 1 }}</div>

      <!-- Column A -->
      <div class="cell-wrap">
        <input
          class="cell-input"
          type="text"
          [(ngModel)]="row.leftValue"
          (ngModelChange)="onInput()"
          placeholder="—"
          [attr.data-row]="i"
          data-col="left"
          (keydown)="onKeyDown($event, i, 'left')"
        />
        <button class="cell-clear" [class.visible]="row.leftValue"
          (click)="clearCell(row, 'left')" tabindex="-1" aria-label="Clear">
          <svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <!-- Column B -->
      <div class="cell-wrap">
        <button class="cell-promote" [class.visible]="row.rightValue"
          (click)="promoteToCaliplayer(row)" tabindex="-1" aria-label="Set as Cali Player">*</button>
        <input
          class="cell-input has-promote"
          type="text"
          [(ngModel)]="row.rightValue"
          (ngModelChange)="onInput()"
          placeholder="—"
          [attr.data-row]="i"
          data-col="right"
          (keydown)="onKeyDown($event, i, 'right')"
        />
        <button class="cell-clear" [class.visible]="row.rightValue"
          (click)="clearCell(row, 'right')" tabindex="-1" aria-label="Clear">
          <svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="table-footer-btns">
    <button class="footer-btn footer-btn-add" (click)="addRow()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      Add another row
    </button>
    <button class="footer-btn footer-btn-del" [disabled]="rows.length <= 1" (click)="deleteLastRow()">
      Delete last row
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
        <path d="M10 11v6"/><path d="M14 11v6"/>
        <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
      </svg>
    </button>
  </div>
</div>
