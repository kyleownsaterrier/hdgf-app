# Copy this file to:
#   amplify/backend/api/<YOUR_API_NAME>/schema.graphql
# Then run: amplify push

type DoublesTable @model @auth(rules: [{ allow: public, provider: apiKey }]) {
  id: ID!
  rows: AWSJSON!
  caliPlayer: String
}

type BagTagsTable @model @auth(rules: [{ allow: public, provider: apiKey }]) {
  id: ID!
  rows: AWSJSON!
}

# One record per player. id = playerName (lowercased) for easy upsert.
type LeaderboardEntry @model @auth(rules: [{ allow: public, provider: apiKey }]) {
  id: ID!
  playerName: String!
  tagNum: Int!
  lastPlayed: AWSDate!
}
